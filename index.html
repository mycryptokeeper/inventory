<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RelevantTec Inventory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:#f5f5f5}
.login-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.login-logo{font-size:12px;font-weight:600;letter-spacing:0.1em;color:#888;text-transform:uppercase;margin-bottom:1.5rem}
.login-title{font-size:24px;font-weight:600;margin-bottom:0.5rem;color:#1a1a1a}
.login-sub{font-size:14px;color:#888;margin-bottom:2rem;line-height:1.5}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s;color:#1a1a1a}
.google-btn:hover{background:#f9f9f9}
.google-btn svg{width:18px;height:18px;flex-shrink:0}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.app-name{font-size:15px;font-weight:600;color:#1a1a1a}
.app-sub{font-size:11px;color:#888}
.user-info{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#1d4ed8;flex-shrink:0}
.signout-btn{font-size:12px;color:#666;background:none;border:1px solid #ddd;border-radius:6px;padding:5px 10px;cursor:pointer}
.signout-btn:hover{background:#f5f5f5}
.sync-status{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px 1rem;background:#fff;border-bottom:1px solid #e5e5e5}
.stat-card{background:#f9f9f9;border-radius:8px;padding:10px 12px}
.stat-label{font-size:11px;color:#888;margin-bottom:3px}
.stat-val{font-size:20px;font-weight:600;color:#1a1a1a}
.stat-val.green{color:#16a34a}
.stat-val.yellow{color:#d97706}
.stat-val.red{color:#dc2626}
.controls{padding:10px 1rem;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#fff;border-bottom:1px solid #e5e5e5}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;font-size:13px;border:1px solid #e0e0e0;border-radius:7px;background:#f9f9f9;color:#1a1a1a;outline:none}
.search-wrap input:focus{border-color:#aaa;background:#fff}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;font-size:13px}
select{padding:8px 10px;font-size:13px;border:1px solid #e0e0e0;border-radius:7px;background:#f9f9f9;color:#1a1a1a;outline:none}
select:focus{border-color:#aaa}
.btn{padding:8px 13px;font-size:13px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{color:#dc2626;border-color:#fecaca}
.btn-danger:hover{background:#fef2f2}
.loc-tabs{display:flex;gap:0;overflow-x:auto;padding:0 1rem;background:#fff;border-bottom:1px solid #e5e5e5;scrollbar-width:none}
.loc-tabs::-webkit-scrollbar{display:none}
.loc-tab{padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:#888;background:none;border-top:none;border-left:none;border-right:none;font-weight:500}
.loc-tab:hover{color:#1a1a1a}
.loc-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;padding:1rem}
.part-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem;display:flex;flex-direction:column;gap:10px}
.part-card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.part-name{font-size:15px;font-weight:600;line-height:1.3;color:#1a1a1a}
.part-cat{font-size:11px;color:#666;background:#f0f0f0;padding:3px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.part-desc{font-size:12px;color:#888;line-height:1.5}
.part-photo{width:100%;height:130px;object-fit:cover;border-radius:8px;border:1px solid #eee}
.stock-rows{border:1px solid #f0f0f0;border-radius:8px;overflow:hidden}
.stock-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #f0f0f0}
.stock-row:last-child{border-bottom:none}
.stock-row:nth-child(even){background:#fafafa}
.loc-name{font-size:12px;color:#666}
.loc-qty{display:flex;align-items:center;gap:6px}
.qty-num{font-size:13px;font-weight:600;color:#1a1a1a}
.badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600}
.badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef9c3;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.card-prices{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.price-item{display:flex;flex-direction:column;gap:2px;background:#f9f9f9;border-radius:6px;padding:6px 8px}
.price-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.04em}
.price-val{font-size:13px;font-weight:600;color:#1a1a1a}
.price-val.green{color:#16a34a}
.price-val.red{color:#dc2626}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.card-actions .btn{flex:1;font-size:12px;padding:6px 8px;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:14px;border:1px solid #e5e5e5;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h2{font-size:18px;font-weight:600}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:#666;font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:9px 11px;font-size:13px;border:1px solid #e0e0e0;border-radius:7px;background:#f9f9f9;color:#1a1a1a;width:100%;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#aaa;background:#fff}
.form-group textarea{resize:vertical;min-height:64px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:0.5rem;border-top:1px solid #f0f0f0}
.qty-grid{display:flex;flex-direction:column;gap:10px}
.qty-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:#f9f9f9;border-radius:8px}
.qty-row label{font-size:13px;color:#1a1a1a;font-weight:500}
.qty-row input{width:80px;padding:6px 8px;font-size:13px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#1a1a1a;text-align:right}
.empty{text-align:center;padding:4rem 1rem;color:#888;font-size:14px}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:4rem;color:#888;font-size:14px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid #e5e5e5;border-top-color:#888;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none;max-width:300px}
.toast.show{opacity:1}
.warning-banner{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:1rem;line-height:1.5}
@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(3,1fr)}
  .stats-bar .stat-card:nth-child(4),.stats-bar .stat-card:nth-child(5){display:none}
  .form-row{grid-template-columns:1fr}
  .card-prices{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">RelevantTec LLC</div>
    <div class="login-title">Inventory</div>
    <div class="login-sub">Sign in with your Google account to access parts inventory.</div>
    <button class="google-btn" onclick="startGoogleLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="app-name">RelevantTec Inventory</div>
        <div class="app-sub">Parts &amp; Stock Management</div>
      </div>
      <div class="sync-status" id="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-text">Synced</span>
      </div>
    </div>
    <div class="user-info">
      <div class="avatar" id="user-avatar">?</div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="loc-tabs" id="loc-tabs"></div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search parts..." oninput="renderParts()">
    </div>
    <select id="cat-filter" onchange="renderParts()"><option value="">All categories</option></select>
    <select id="status-filter" onchange="renderParts()">
      <option value="">All statuses</option>
      <option value="in">In stock</option>
      <option value="low">Low stock</option>
      <option value="out">Out of stock</option>
    </select>
    <button class="btn btn-primary" onclick="openAddPart()">+ Add part</button>
    <button class="btn" onclick="openTransfer()">Transfer</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
  </div>
  <div id="parts-container"></div>
</div>

<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '446393128221-g2boub14rrlrjiqv4gdqesma2efg5fsu.apps.googleusercontent.com';
const SHEET_ID = '1AlBBw7bX0iB0gG4ZzgPA-Y8Pcshhc2is-f9M6zDoYyQ';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
const LOCS = ['Luis Service Truck','Lubbock Service Truck','Lubbock Office','Burkburnett Office','Burkburnett Service Truck'];

let parts = [];
let currentLoc = 'All';
let accessToken = null;
let tokenClient = null;
let gsiReady = false;

function onGsiLoad(){
  gsiReady = true;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if(resp.error){ showToast('Sign in failed: ' + resp.error); return; }
      accessToken = resp.access_token;
      await getUserInfo();
      showApp();
      await loadFromSheets();
    }
  });
}

function startGoogleLogin(){
  if(!gsiReady){ showToast('Loading, please wait...'); setTimeout(startGoogleLogin, 600); return; }
  tokenClient.requestAccessToken({prompt:'consent'});
}

async function getUserInfo(){
  try{
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
    const d = await r.json();
    const initials = (d.name||d.email||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('user-avatar').textContent = initials;
  }catch(e){}
}

function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  renderLocTabs();
}

function signOut(){
  if(typeof google !== 'undefined') google.accounts.oauth2.revoke(accessToken, ()=>{});
  accessToken = null;
  parts = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function setSyncStatus(state, text){
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  txt.textContent = text;
}

async function sheetsGet(){
  setSyncStatus('syncing','Loading...');
  const r = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1`,
    {headers:{Authorization:'Bearer '+accessToken}}
  );
  if(!r.ok){ const e=await r.json(); throw new Error(e.error?.message||'Sheets API error'); }
  setSyncStatus('ok','Synced');
  return await r.json();
}

async function sheetsPut(values){
  setSyncStatus('syncing','Saving...');
  const r = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1:ZZ9999?valueInputOption=RAW`,
    {method:'PUT',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
     body:JSON.stringify({range:'Sheet1!A1:ZZ9999',majorDimension:'ROWS',values})}
  );
  if(!r.ok){
    const e=await r.json();
    console.error('Sheets PUT error:', JSON.stringify(e));
    throw new Error(e.error?.message||'Save error (status '+r.status+')');
  }
  setSyncStatus('ok','Synced');
}

async function loadFromSheets(){
  document.getElementById('parts-container').innerHTML = '<div class="loading-overlay"><div class="spinner"></div>Loading inventory...</div>';
  try{
    const data = await sheetsGet();
    if(!data.values || data.values.length < 2){
      await seedSampleData();
      return;
    }
    parts = [];
    for(let i=1;i<data.values.length;i++){
      const r = data.values[i];
      if(!r[0]) continue;
      const p = {
        id:r[0]||'', name:r[1]||'', category:r[2]||'', description:r[3]||'',
        maxStock:parseInt(r[4])||0, customerPrice:parseFloat(r[5])||0,
        costToYou:parseFloat(r[6])||0, reorderURL:r[7]||'', photoURL:r[8]||'',
        stock:{}
      };
      LOCS.forEach((loc,idx)=>{ p.stock[loc]=parseInt(r[9+idx])||0; });
      parts.push(p);
    }
    renderAll();
  }catch(e){
    document.getElementById('parts-container').innerHTML = '<div class="empty">Error loading data: '+e.message+'</div>';
    setSyncStatus('error','Error');
  }
}

async function saveToSheets(){
  const headers = ['id','name','category','description','maxStock','customerPrice','costToYou','reorderURL','photoURL',...LOCS];
  const values = [headers];
  parts.forEach(p=>{
    const row = [p.id,p.name,p.category,p.description,p.maxStock,p.customerPrice,p.costToYou,p.reorderURL,p.photoURL];
    LOCS.forEach(loc=>row.push(p.stock[loc]||0));
    values.push(row);
  });
  try{ await sheetsPut(values); }
  catch(e){ showToast('Save error: '+e.message); setSyncStatus('error','Error'); console.error('saveToSheets error:',e); }
}

async function seedSampleData(){
  const sample = [
    {id:'p1',name:'CAT5e Patch Cable 3ft',category:'Cables',description:'Standard patch cable for network connections',maxStock:50,customerPrice:8.99,costToYou:2.50,reorderURL:'',photoURL:''},
    {id:'p2',name:'CAT6 Patch Cable 6ft',category:'Cables',description:'CAT6 cable for gigabit connections',maxStock:40,customerPrice:12.99,costToYou:3.75,reorderURL:'',photoURL:''},
    {id:'p3',name:'HDMI Cable 6ft',category:'Cables',description:'Standard HDMI cable for display connections',maxStock:30,customerPrice:14.99,costToYou:4.00,reorderURL:'',photoURL:''}
  ];
  sample.forEach(p=>{ p.stock={}; LOCS.forEach(loc=>{ p.stock[loc]=0; }); });
  parts = sample;
  await saveToSheets();
  renderAll();
}

function renderAll(){ renderStats(); renderLocTabs(); renderParts(); renderCategories(); }

function getStockStatus(p, loc){
  const qty = loc==='All' ? LOCS.reduce((s,l)=>s+(p.stock[l]||0),0) : (p.stock[loc]||0);
  const max = loc==='All' ? p.maxStock*LOCS.length : p.maxStock;
  if(qty===0) return 'out';
  if(qty <= max*0.3) return 'low';
  return 'in';
}

function renderStats(){
  let total=parts.length, inStock=0, low=0, out=0, cost=0;
  parts.forEach(p=>{
    const s=getStockStatus(p,currentLoc);
    if(s==='in') inStock++;
    else if(s==='low') low++;
    else out++;
    const qty = currentLoc==='All' ? LOCS.reduce((a,l)=>a+(p.stock[l]||0),0) : (p.stock[currentLoc]||0);
    cost += qty * p.costToYou;
  });
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total parts</div><div class="stat-val">${total}</div></div>
    <div class="stat-card"><div class="stat-label">In stock</div><div class="stat-val green">${inStock}</div></div>
    <div class="stat-card"><div class="stat-label">Low stock</div><div class="stat-val yellow">${low}</div></div>
    <div class="stat-card"><div class="stat-label">Out of stock</div><div class="stat-val red">${out}</div></div>
    <div class="stat-card"><div class="stat-label">Inventory cost</div><div class="stat-val">$${cost.toFixed(2)}</div></div>`;
}

function renderLocTabs(){
  const tabs = document.getElementById('loc-tabs');
  if(!tabs) return;
  tabs.innerHTML = '';
  ['All',...LOCS].forEach(l=>{
    const btn = document.createElement('button');
    btn.className = 'loc-tab' + (currentLoc===l?' active':'');
    btn.textContent = l;
    btn.onclick = ()=>{ currentLoc=l; renderAll(); };
    tabs.appendChild(btn);
  });
}

function setLoc(loc){ currentLoc=loc; renderAll(); }

function renderCategories(){
  const cats=[...new Set(parts.map(p=>p.category).filter(Boolean))].sort();
  const sel=document.getElementById('cat-filter');
  const cur=sel.value;
  sel.innerHTML='<option value="">All categories</option>'+cats.map(c=>`<option value="${c}"${cur===c?' selected':''}>${c}</option>`).join('');
}

function renderParts(){
  const search=document.getElementById('search-input').value.toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const status=document.getElementById('status-filter').value;
  const filtered=parts.filter(p=>{
    const ms=!search||p.name.toLowerCase().includes(search)||p.description.toLowerCase().includes(search)||p.category.toLowerCase().includes(search);
    const mc=!cat||p.category===cat;
    const mst=!status||getStockStatus(p,currentLoc)===status;
    return ms&&mc&&mst;
  });
  const container=document.getElementById('parts-container');
  if(filtered.length===0){ container.innerHTML='<div class="empty">No parts found.</div>'; renderStats(); return; }
  container.innerHTML='<div class="parts-grid">'+filtered.map(p=>renderCard(p)).join('')+'</div>';
  renderStats();
}

function renderCard(p){
  const locsToShow=currentLoc==='All'?LOCS:[currentLoc];
  const stockRows=locsToShow.map(loc=>{
    const qty=p.stock[loc]||0;
    const s=getStockStatus(p,loc);
    const badge=s==='in'?'badge-green':s==='low'?'badge-yellow':'badge-red';
    const label=s==='in'?'In stock':s==='low'?'Low':'Out';
    return `<div class="stock-row"><span class="loc-name">${loc}</span><div class="loc-qty"><span class="qty-num">${qty}</span><span class="badge ${badge}">${label}</span></div></div>`;
  }).join('');
  const margin=p.customerPrice-p.costToYou;
  const photo=p.photoURL?`<img src="${p.photoURL}" class="part-photo" onerror="this.style.display='none'" alt="">` :'';
  const reorderBtn=p.reorderURL?`<button class="btn" onclick="window.open('${p.reorderURL}','_blank')">Reorder</button>`:'';
  return `<div class="part-card">
    ${photo}
    <div class="card-top"><div class="part-name">${escHtml(p.name)}</div><span class="part-cat">${escHtml(p.category||'—')}</span></div>
    ${p.description?`<div class="part-desc">${escHtml(p.description)}</div>`:''}
    <div class="stock-rows">${stockRows}</div>
    <div class="card-prices">
      <div class="price-item"><span class="price-label">Customer</span><span class="price-val">$${p.customerPrice.toFixed(2)}</span></div>
      <div class="price-item"><span class="price-label">Cost</span><span class="price-val">$${p.costToYou.toFixed(2)}</span></div>
      <div class="price-item"><span class="price-label">Margin</span><span class="price-val ${margin>=0?'green':'red'}">$${margin.toFixed(2)}</span></div>
      <div class="price-item"><span class="price-label">Max stock</span><span class="price-val">${p.maxStock}</span></div>
    </div>
    <div class="card-actions">
      <button class="btn" onclick="openEdit('${p.id}')">Edit</button>
      <button class="btn" onclick="openQty('${p.id}')">Qty</button>
      ${reorderBtn}
      <button class="btn btn-danger" onclick="deletePart('${p.id}')">Delete</button>
    </div>
  </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openAddPart(){ openPartModal(null); }
function openEdit(id){ openPartModal(parts.find(p=>p.id===id)); }

function openPartModal(part){
  const isEdit=!!part;
  document.getElementById('modal-content').innerHTML=`
    <h2>${isEdit?'Edit part':'Add part'}</h2>
    <div class="form-row">
      <div class="form-group"><label>Part name *</label><input id="f-name" value="${isEdit?escHtml(part.name):''}"></div>
      <div class="form-group"><label>Category</label><input id="f-cat" value="${isEdit?escHtml(part.category):''}"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="f-desc">${isEdit?escHtml(part.description):''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Max stock</label><input id="f-max" type="number" value="${isEdit?part.maxStock:0}"></div>
      <div class="form-group"><label>Customer price ($)</label><input id="f-cprice" type="number" step="0.01" value="${isEdit?part.customerPrice:0}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cost to you ($)</label><input id="f-cost" type="number" step="0.01" value="${isEdit?part.costToYou:0}"></div>
      <div class="form-group"><label>Reorder URL</label><input id="f-url" value="${isEdit?escHtml(part.reorderURL):''}"></div>
    </div>
    <div class="form-group"><label>Photo URL</label><input id="f-photo" value="${isEdit?escHtml(part.photoURL):''}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePart('${isEdit?part.id:''}')">${isEdit?'Save changes':'Add part'}</button>
    </div>`;
  document.getElementById('modal-bg').style.display='flex';
}

async function savePart(id){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ showToast('Part name is required'); return; }
  if(id){
    const p=parts.find(x=>x.id===id);
    p.name=name; p.category=document.getElementById('f-cat').value.trim();
    p.description=document.getElementById('f-desc').value.trim();
    p.maxStock=parseInt(document.getElementById('f-max').value)||0;
    p.customerPrice=parseFloat(document.getElementById('f-cprice').value)||0;
    p.costToYou=parseFloat(document.getElementById('f-cost').value)||0;
    p.reorderURL=document.getElementById('f-url').value.trim();
    p.photoURL=document.getElementById('f-photo').value.trim();
  } else {
    const newP={
      id:'p'+Date.now(), name, category:document.getElementById('f-cat').value.trim(),
      description:document.getElementById('f-desc').value.trim(),
      maxStock:parseInt(document.getElementById('f-max').value)||0,
      customerPrice:parseFloat(document.getElementById('f-cprice').value)||0,
      costToYou:parseFloat(document.getElementById('f-cost').value)||0,
      reorderURL:document.getElementById('f-url').value.trim(),
      photoURL:document.getElementById('f-photo').value.trim(),
      stock:{}
    };
    LOCS.forEach(l=>{ newP.stock[l]=0; });
    parts.push(newP);
  }
  closeModal();
  await saveToSheets();
  renderAll();
  showToast(id?'Part updated':'Part added');
}

async function deletePart(id){
  if(!confirm('Delete this part? This cannot be undone.')) return;
  parts=parts.filter(p=>p.id!==id);
  await saveToSheets();
  renderAll();
  showToast('Part deleted');
}

function openQty(id){
  const p=parts.find(x=>x.id===id);
  document.getElementById('modal-content').innerHTML=`
    <h2>Edit quantities — ${escHtml(p.name)}</h2>
    <div class="qty-grid">
      ${LOCS.map(loc=>`<div class="qty-row"><label>${loc}</label><input type="number" id="qty-${loc.replace(/\s/g,'_')}" value="${p.stock[loc]||0}" min="0"></div>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveQty('${id}')">Save</button>
    </div>`;
  document.getElementById('modal-bg').style.display='flex';
}

async function saveQty(id){
  const p=parts.find(x=>x.id===id);
  LOCS.forEach(loc=>{ p.stock[loc]=parseInt(document.getElementById('qty-'+loc.replace(/\s/g,'_')).value)||0; });
  closeModal();
  await saveToSheets();
  renderAll();
  showToast('Quantities updated');
}

function openTransfer(){
  if(parts.length===0){ showToast('No parts to transfer'); return; }
  document.getElementById('modal-content').innerHTML=`
    <h2>Transfer stock</h2>
    <div class="form-group"><label>Part</label>
      <select id="t-part" onchange="updateAvailable()">
        ${parts.map(p=>`<option value="${p.id}">${escHtml(p.name)}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>From</label>
        <select id="t-from" onchange="updateAvailable()">
          ${LOCS.map(l=>`<option>${l}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>To</label>
        <select id="t-to">
          ${LOCS.map((l,i)=>`<option${i===1?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Quantity</label><input id="t-qty" type="number" value="1" min="1"></div>
    <div id="t-avail" style="font-size:12px;color:#888;padding:4px 0"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doTransfer()">Transfer</button>
    </div>`;
  document.getElementById('modal-bg').style.display='flex';
  updateAvailable();
}

function updateAvailable(){
  const pid=document.getElementById('t-part')?.value;
  const from=document.getElementById('t-from')?.value;
  if(!pid||!from) return;
  const p=parts.find(x=>x.id===pid);
  document.getElementById('t-avail').textContent=`Available at ${from}: ${p?.stock[from]||0} units`;
}

async function doTransfer(){
  const pid=document.getElementById('t-part').value;
  const from=document.getElementById('t-from').value;
  const to=document.getElementById('t-to').value;
  const qty=parseInt(document.getElementById('t-qty').value)||0;
  if(from===to){ showToast('From and To must be different'); return; }
  if(qty<=0){ showToast('Quantity must be at least 1'); return; }
  const p=parts.find(x=>x.id===pid);
  if((p.stock[from]||0)<qty){ showToast('Not enough stock at source location'); return; }
  p.stock[from]=(p.stock[from]||0)-qty;
  p.stock[to]=(p.stock[to]||0)+qty;
  closeModal();
  await saveToSheets();
  renderAll();
  showToast(`Transferred ${qty} unit(s) from ${from} to ${to}`);
}

function exportCSV(){
  const headers=['Name','Category','Description','Max Stock','Customer Price','Cost To You','Reorder URL','Photo URL',...LOCS];
  const rows=parts.map(p=>[p.name,p.category,p.description,p.maxStock,p.customerPrice,p.costToYou,p.reorderURL,p.photoURL,...LOCS.map(l=>p.stock[l]||0)]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='relevanttec_inventory.csv';
  a.click();
  showToast('CSV exported');
}

function closeModal(){ document.getElementById('modal-bg').style.display='none'; }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async defer></script>
</body>
